# Laboratory Inventory API - Default Configuration
# Override values in development.yaml or production.yaml

server:
  port: 3001
  host: "0.0.0.0"

database:
  host: "localhost"
  port: 5432
  name: "laboratory_inventory"
  user: "postgres"
  password: "postgres"
  url: ""
  poolSize: 10
  ssl: false

jwt:
  secret: "laboratory-inventory-secret-key-2024"
  expiresIn: 7200
  algorithm: "RS256"
  privateKeyPath: "keys/private-rs256.pem"
  publicKeyPath: "keys/public-rs256.pem"

logging:
  jsonFormat: false
  level: "info"
  requests: true

cors:
  enabled: true
  origins:
    - "*"
  methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  headers:
    - Content-Type
    - Authorization

dashboard:
  stock:
    warningLevel: 50
    criticalLevel: 25
    outOfStockLevel: 0
  alerts:
    enableLowStock: true
    enableOutOfStock: true
