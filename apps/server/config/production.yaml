# Production Configuration
# Only override values that differ from default.yaml

server:
  host: "0.0.0.0"

database:
  ssl: true
  poolSize: 20

jwt:
  algorithm: "RS512"
  privateKeyPath: "keys/private-rs512.pem"
  publicKeyPath: "keys/public-rs512.pem"

logging:
  jsonFormat: true
  level: "info"
  requests: false

cors:
  enabled: true
  origins:
    - "https://your-domain.com"
