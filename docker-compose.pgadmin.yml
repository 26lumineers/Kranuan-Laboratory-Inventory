services:
    pgadmin:
        image: dpage/pgadmin4:latest
        container_name: lab_pgadmin
        restart: unless-stopped
        environment:
            PGADMIN_DEFAULT_EMAIL: admin@lab.local
            PGADMIN_DEFAULT_PASSWORD: strongpassword
        ports:
            - '5050:80'
        volumes:
            - pgadmin_data:/var/lib/pgadmin

volumes:
    pgadmin_data:
